  <rect width="1024" height="1024" rx="200" ry="200" fill="#f5f5f7"/>
  <!-- Subtle border/shadow for depth -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="none" stroke="#e0e0e0" stroke-width="4"/>
  <!-- Pulse / heartbeat waveform path -->
  <path
    d="M 200 512
       L 350 512
       L 420 380
       L 490 260
       L 560 740
       L 630 512
       L 700 512
       L 760 400
       L 824 512"
