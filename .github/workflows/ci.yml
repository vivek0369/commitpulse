name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  merge_group: # Run CI on the merged commit before it lands on main

jobs:
  quality:
    name: Format · Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run NPM Audit Security Check
        run: npm audit --audit-level=high || true

      - name: Check Prettier Formatting
        run: npm run format:check

      - name: Run Stylelint
        run: npm run lint:css

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Run Unit Tests (Vitest)
        run: npm run test:coverage

  build:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false

      - name: Measure Bundle Size
        run: node scripts/measure-bundle-size.js bundle-sizes.json

      - name: Upload Bundle Sizes
        uses: actions/upload-artifact@v4
        with:
          name: bundle-sizes
          path: |
            bundle-sizes.json
            scripts/measure-bundle-size.js
            scripts/compare-bundle-sizes.js
