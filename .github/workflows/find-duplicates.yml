name: Find Semantic Duplicates

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  check-duplicates:
    name: Scan for Duplicate Issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd .github/scripts
          npm ci

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: .github/scripts/.cache
          key: ${{ runner.os }}-embeddings-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-embeddings-cache-

      - name: Run Duplicate Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/check-duplicates.js
